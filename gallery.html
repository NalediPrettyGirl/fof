        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-placeholder"></div>
        <div class="top-bar-text">
            JOIN US EVERY SUNDAY AT 09:00
        </div>
        <div class="top-bar-social">
            <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
            <a href="#" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
            <a href="#" aria-label="Spotify"><i class="fa-brands fa-spotify"></i></a>
            <a href="#" aria-label="Podcast"><i class="fa-solid fa-podcast"></i></a>
        </div>
    </div>

    <!-- HEADER / NAVIGATION -->
    <header>
        <div class="logo-container" onclick="location.href='index.html'">
            <img src="img/logo.png" alt="Flames of Fire Logo">
        </div>

        <nav>
            <a href="index.html">HOME</a>
            <a href="about.html">ABOUT</a>
            <a href="events.html">EVENTS</a>
            <a href="gallery.html" class="active">GALLERY</a>
            <a href="sermons.html">RECENT SERMON</a>
            <a href="give.html">GIVE</a>
            <a href="branches.html">BRANCHES</a>
        </nav>
    </header>

    <!-- PAGE HERO -->
    <section class="page-hero" style="background-image: url('https://images.unsplash.com/photo-1510673398445-94f47dc6a8c4?auto=format&fit=crop&q=80&w=1200');">
        <div class="hero-content">
            <h4 class="sub-heading" style="color: #fff;">CHURCH LIFE</h4>
            <h1>Photo Gallery</h1>
        </div>
    </section>

    <!-- GALLERY GRID SECTION -->
    <section class="gallery-full-page" style="padding: 100px 20px; background: #fff;">
        <div class="container" style="max-width: 1200px; margin: 0 auto;">
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
                <!-- Gallery items with nice hover effects -->
                <div style="overflow: hidden; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative;" class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1438232992991-995b7058bbb3?auto=format&fit=crop&q=80&w=800" alt="Worship" style="width: 100%; height: 300px; object-fit: cover; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                </div>
                <div style="overflow: hidden; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);" class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1523580494863-6f3031224c94?auto=format&fit=crop&q=80&w=800" alt="Community" style="width: 100%; height: 300px; object-fit: cover; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                </div>
                <div style="overflow: hidden; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);" class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1532629345422-7515f3d16bb6?auto=format&fit=crop&q=80&w=800" alt="Offering" style="width: 100%; height: 300px; object-fit: cover; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                </div>
                <div style="overflow: hidden; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);" class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1544427928-c49cdfebf4ad?auto=format&fit=crop&q=80&w=800" alt="Sermon" style="width: 100%; height: 300px; object-fit: cover; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                </div>
                <div style="overflow: hidden; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);" class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1527529482837-4698179dc6ce?auto=format&fit=crop&q=80&w=800" alt="Fellowship" style="width: 100%; height: 300px; object-fit: cover; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                </div>
                <div style="overflow: hidden; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);" class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&q=80&w=800" alt="Youth" style="width: 100%; height: 300px; object-fit: cover; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                </div>
            </div>
        </div>
    </section>

    <!-- SERVICE INFO BAR -->
    <section class="service-info-bar">
        <div class="sib-container">
            <div class="sib-col">
                <h3>Service Times</h3>
                <p><strong>Sundays</strong></p>
                <p>09:00</p>
            </div>
            <div class="sib-col">
                <h3>Contact Info</h3>
                <p>+27 11 859 1030</p>
                <p>info@flamesoffire.co.za</p>
            </div>
            <div class="sib-col">
                <h3>Follow Us</h3>
                <div class="sib-social">
                    <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
                    <a href="#" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="#" aria-label="Spotify"><i class="fa-brands fa-spotify"></i></a>
                    <a href="#" aria-label="Podcast"><i class="fa-solid fa-podcast"></i></a>
                </div>
            </div>
        </div>
    </section>

    <!-- Scroll to Top Button -->
    <a href="#" id="scroll-to-top" class="scroll-to-top" aria-label="Scroll to top"><i class="fa-solid fa-arrow-up"></i></a>
    <script src="script.js"></script>

</html>
